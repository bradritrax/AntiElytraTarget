name: Java 17 Plugin Build (v4)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Depoyu kontrol et (v4 sürümü)
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Java 17 ortamını kur (v4 sürümü)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin' # En stabil ve yaygın dağıtım
        cache: 'maven'         # Bağımlılıkları önbelleğe alarak build süresini kısaltır

    # 3. Maven ile Build al
    - name: Build with Maven
      run: mvn -B package --file pom.xml

    # 4. Oluşan .jar dosyasını artifact olarak yükle (v4 sürümü)
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AntiElytraTarget-1.17.1
        path: target/*.jar
        if-no-files-found: error
        
